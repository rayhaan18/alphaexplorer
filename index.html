<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alpha Explorer + InvestorPlaybook</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .fade { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

/* =========================
   NAV BAR
========================= */
function Nav({ page, setPage, darkMode, setDarkMode }) {
  return (
    <div className="flex justify-between items-center p-4 bg-gray-900 text-white">
      <div className="font-bold text-xl">Alpha Explorer</div>

      <div className="flex gap-4">
        <button onClick={() => setPage("home")}>Home</button>
        <button onClick={() => setPage("alpha")}>Dashboard</button>
        <button onClick={() => setPage("invest")}>Invest</button>
        <button onClick={() => setPage("chat")}>Chat</button>

        <button
          onClick={() => setDarkMode(!darkMode)}
          className="ml-4 bg-gray-700 px-2 py-1 rounded"
        >
          {darkMode ? "Light" : "Dark"}
        </button>
      </div>
    </div>
  );
}

/* =========================
   HOME PAGE
========================= */
function Home() {
  return (
    <div className="p-10 fade">
      <h1 className="text-4xl font-bold mb-4">Welcome to Alpha Explorer 🚀</h1>
      <p>All-in-one stock learning + AI investing + analytics platform.</p>
    </div>
  );
}

/* =========================
   ALPHA DASHBOARD
========================= */
function AlphaDashboard() {
  return (
    <div className="p-10 fade">
      <h2 className="text-3xl font-bold mb-6">Market Dashboard</h2>

      <div className="grid grid-cols-3 gap-4">
        <div className="p-4 bg-gray-200 rounded">S&P 500</div>
        <div className="p-4 bg-gray-200 rounded">NVIDIA: 17.2%</div>
        <div className="p-4 bg-gray-200 rounded">PLTR: 12.6%</div>
      </div>

      <div className="mt-10">
        <h3 className="text-xl font-bold">Charts</h3>
        <img src="nvda_chart.png" className="w-full mt-4"/>
        <img src="pltr_chart.png" className="w-full mt-4"/>
        <img src="sp500_chart.png" className="w-full mt-4"/>
      </div>
    </div>
  );
}

/* =========================
   INVESTOR PLAYBOOK (SIMPLIFIED CORE)
========================= */
function InvestPage() {
  const [risk, setRisk] = useState("medium");

  const portfolio = {
    low: ["JNJ", "KO", "PG"],
    medium: ["AAPL", "MSFT", "GOOGL"],
    high: ["NVDA", "TSLA", "AMD"]
  };

  return (
    <div className="p-10 fade">
      <h2 className="text-3xl font-bold mb-4">AI Portfolio Builder</h2>

      <select
        value={risk}
        onChange={(e) => setRisk(e.target.value)}
        className="p-2 border"
      >
        <option value="low">Low Risk</option>
        <option value="medium">Medium Risk</option>
        <option value="high">High Risk</option>
      </select>

      <div className="mt-6">
        <h3 className="font-bold">Recommended Stocks:</h3>
        <ul>
          {portfolio[risk].map(s => <li key={s}>{s}</li>)}
        </ul>
      </div>
    </div>
  );
}

/* =========================
   CHATBOT (REACT VERSION)
========================= */
function Chat() {
  const [messages, setMessages] = useState([
    { role: "bot", text: "Tell me a stock and why you'd invest in it." }
  ]);
  const [input, setInput] = useState("");

  const responses = {
    AAPL: "Apple is strong due to ecosystem lock-in and cash flow.",
    TSLA: "Tesla is high growth but very volatile.",
    NVDA: "Nvidia leads AI chips and is dominating the market.",
    MSFT: "Microsoft is stable with strong cloud growth."
  };

  const send = () => {
    if (!input) return;

    const userMsg = { role: "user", text: input };
    let botReply = "Interesting — tell me more.";

    for (let key in responses) {
      if (input.toUpperCase().includes(key)) {
        botReply = responses[key];
      }
    }

    setMessages([...messages, userMsg, { role: "bot", text: botReply }]);
    setInput("");
  };

  return (
    <div className="p-10 fade">
      <h2 className="text-2xl font-bold mb-4">Stock Chatbot</h2>

      <div className="h-64 overflow-y-auto border p-4 mb-4">
        {messages.map((m, i) => (
          <div key={i} className={m.role === "user" ? "text-right" : "text-left"}>
            <p className="inline-block p-2 m-1 bg-gray-200 rounded">
              {m.text}
            </p>
          </div>
        ))}
      </div>

      <div className="flex">
        <input
          value={input}
          onChange={(e) => setInput(e.target.value)}
          className="border flex-1 p-2"
        />
        <button onClick={send} className="bg-blue-500 text-white px-4">
          Send
        </button>
      </div>
    </div>
  );
}

/* =========================
   FOOTER
========================= */
function Footer() {
  return (
    <div className="text-center p-6 mt-10 border-t">
      <p>© 2025 Alpha Explorer</p>
      <p>Built with React 🚀</p>
    </div>
  );
}

/* =========================
   MAIN APP
========================= */
function App() {
  const [page, setPage] = useState("home");
  const [darkMode, setDarkMode] = useState(false);

  return (
    <div className={darkMode ? "bg-black text-white min-h-screen" : "bg-white text-black min-h-screen"}>
      <Nav page={page} setPage={setPage} darkMode={darkMode} setDarkMode={setDarkMode} />

      {page === "home" && <Home />}
      {page === "alpha" && <AlphaDashboard />}
      {page === "invest" && <InvestPage />}
      {page === "chat" && <Chat />}

      <Footer />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
