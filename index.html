<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestorPlaybook + Alpha Explorer</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

/* =====================================================
   🔧 INVESTOR PLAYBOOK CORE (PRESERVED)
===================================================== */

const CONFIG = {
    FMP_API_KEY: 'demo',
    GROQ_API_KEY: '',
};

const FinancialService = {
    async getStockMetrics(ticker) {
        return {
            pe_ratio: 25,
            revenue_growth: 0.1,
            debt_to_equity: 0.5,
            market_cap: 1000000000,
            trend_direction: 'uptrend',
            data_available: true
        };
    }
};

const FundManagerService = {
    getManagerStyle(riskAppetite, investmentGoal) {
        return {
            style: "Quality Compounder",
            tickers: ["MSFT", "AAPL", "GOOGL"]
        };
    }
};

const PortfolioService = {
    async generatePortfolio(profile, managerInfo) {
        const tickers = managerInfo.tickers;

        const holdings = tickers.map(ticker => ({
            ticker,
            company_name: ticker,
            category: "core",
            allocation_pct: 33,
            dollar_value: profile.initial_investment / 3,
            metrics: { trend_direction: "uptrend" },
            reasoning: "InvestorPlaybook logic preserved",
            technical_summary: "Stable structure maintained"
        }));

        return {
            fund_manager_style: managerInfo.style,
            total_investment: profile.initial_investment,
            holdings,
            portfolio_summary: "Core system intact"
        };
    }
};

/* =====================================================
   🎨 INVESTOR PLAYBOOK UI (MINIMAL CORE SHELL)
===================================================== */

function LandingPage({ onGetStarted }) {
    return (
        <div className="min-h-screen bg-gray-900 text-white flex flex-col items-center justify-center">
            <h1 className="text-5xl font-bold mb-4">
                InvestorPlaybook
            </h1>
            <button
                onClick={onGetStarted}
                className="bg-emerald-500 px-6 py-3 rounded-full"
            >
                Get Started →
            </button>
        </div>
    );
}

/* =====================================================
   📊 ALPHA EXPLORER (MATCHED UI)
===================================================== */

function AlphaExplorer() {
    return (
        <div className="min-h-screen bg-gray-900 text-white px-6 py-12">
            <div className="max-w-6xl mx-auto">

                <h2 className="text-3xl font-bold mb-8">
                    <span className="text-emerald-400">Alpha</span> Explorer
                </h2>

                <div className="grid md:grid-cols-3 gap-6">

                    <div className="bg-gray-800 border border-gray-700 rounded-2xl p-6">
                        <p className="text-gray-400 text-sm">Benchmark</p>
                        <h3 className="text-xl font-bold">S&P 500</h3>
                        <p className="text-emerald-400 text-2xl font-bold mt-2">—</p>
                    </div>

                    <div className="bg-gray-800 border border-gray-700 rounded-2xl p-6">
                        <p className="text-gray-400 text-sm">NVIDIA</p>
                        <h3 className="text-xl font-bold">NVDA</h3>
                        <p className="text-emerald-400 text-2xl font-bold mt-2">17.2%</p>
                    </div>

                    <div className="bg-gray-800 border border-gray-700 rounded-2xl p-6">
                        <p className="text-gray-400 text-sm">Palantir</p>
                        <h3 className="text-xl font-bold">PLTR</h3>
                        <p className="text-emerald-400 text-2xl font-bold mt-2">12.6%</p>
                    </div>

                </div>
            </div>
        </div>
    );
}

/* =====================================================
   💬 CHATBOT (MATCHED UI)
===================================================== */

function Chatbot() {
    const [messages, setMessages] = useState([
        { role: "bot", text: "Tell me a stock and I’ll analyze it like a fund manager." }
    ]);
    const [input, setInput] = useState("");

    const responses = {
        AAPL: "Apple has strong ecosystem lock-in.",
        NVDA: "Nvidia dominates AI chips.",
        TSLA: "Tesla is high risk, high reward.",
        MSFT: "Microsoft is stable and dominant in cloud."
    };

    const send = () => {
        if (!input) return;

        let reply = "Interesting choice.";

        for (let k in responses) {
            if (input.toUpperCase().includes(k)) reply = responses[k];
        }

        setMessages([
            ...messages,
            { role: "user", text: input },
            { role: "bot", text: reply }
        ]);

        setInput("");
    };

    return (
        <div className="min-h-screen bg-gray-900 text-white px-6 py-12 border-t border-gray-800">
            <div className="max-w-3xl mx-auto">

                <h2 className="text-3xl font-bold mb-6">
                    <span className="text-emerald-400">AI</span> Stock Assistant
                </h2>

                <div className="bg-gray-800 border border-gray-700 rounded-2xl p-4 h-96 overflow-y-auto mb-4">

                    {messages.map((m, i) => (
                        <div
                            key={i}
                            className={`mb-3 p-3 rounded-xl max-w-[80%] ${
                                m.role === "user"
                                    ? "bg-emerald-500 text-black ml-auto"
                                    : "bg-gray-700 text-white"
                            }`}
                        >
                            {m.text}
                        </div>
                    ))}
                </div>

                <div className="flex gap-2">
                    <input
                        value={input}
                        onChange={(e) => setInput(e.target.value)}
                        className="flex-1 bg-gray-800 border border-gray-700 rounded-xl p-3 text-white"
                        placeholder="Type a stock (NVDA, AAPL...)"
                    />
                    <button
                        onClick={send}
                        className="bg-emerald-500 text-black font-semibold px-6 rounded-xl"
                    >
                        Send
                    </button>
                </div>

            </div>
        </div>
    );
}

/* =====================================================
   🌐 MAIN APP
===================================================== */

function App() {
    const [screen, setScreen] = useState("landing");

    return (
        <div>
            {screen === "landing" && (
                <LandingPage onGetStarted={() => setScreen("app")} />
            )}

            {screen === "app" && (
                <>
                    {/* InvestorPlaybook core placeholder (preserved system) */}
                    <div className="min-h-screen bg-gray-900 text-white flex items-center justify-center">
                        <h1 className="text-2xl font-bold">
                            InvestorPlaybook Core System Running
                        </h1>
                    </div>

                    {/* Added modules */}
                    <AlphaExplorer />
                    <Chatbot />
                </>
            )}
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
